included:
  - ios

excluded:
  - ios/Tests
  - example

# Rules disabled because they conflict with Expo Modules API patterns
disabled_rules:
  - trailing_whitespace    # handled by editorconfig
  - todo                   # TODOs are intentional during development

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

line_length:
  warning: 120
  error: 160
  ignores_function_declarations: true
  ignores_comments: true

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

identifier_name:
  min_length: 2
  excluded:
    - id
    - ok
