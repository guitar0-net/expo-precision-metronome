name: iOS

on:
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - "example/ios/**"
      - "package.json"
      - "package-lock.json"
      - "expo-module.config.json"
      - ".github/workflows/ci-ios.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HUSKY: "0"

jobs:
  ios-swiftlint:
    name: iOS — SwiftLint
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.3"

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  ios-swift-tests:
    name: iOS — Swift unit tests
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.3"

      - name: Run Swift tests
        run: swift test --package-path ios

  ios-build:
    name: iOS — build (simulator)
    runs-on: macos-latest
    timeout-minutes: 30
    needs: [ios-swiftlint, ios-swift-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.3"

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Install CocoaPods dependencies
        working-directory: example/ios
        run: pod install

      - name: Build iOS (simulator, no signing)
        working-directory: example/ios
        run: |
          xcodebuild \
            -workspace expoprecisionmetronomeexample.xcworkspace \
            -scheme expoprecisionmetronomeexample \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet \
            build
