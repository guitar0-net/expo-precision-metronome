name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HUSKY: "0"

jobs:
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check REUSE compliance
        uses: fsfe/reuse-action@v5

  # ── TypeScript / JS ──────────────────────────────────────────────────────

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: TypeScript type checking
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript
        run: npm run type:check

  tests:
    name: Jest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --ci --passWithNoTests

  # ── Security ─────────────────────────────────────────────────────────────

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            runner: ubuntu-latest
          - language: kotlin
            runner: ubuntu-latest
          - language: swift
            runner: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select Xcode
        if: matrix.language == 'swift'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.x"

      - name: Setup JDK 17
        if: matrix.language == 'kotlin'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Node with cache
        if: matrix.language != 'javascript-typescript'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install root dependencies
        if: matrix.language != 'javascript-typescript'
        run: npm ci

      - name: Install example dependencies
        if: matrix.language != 'javascript-typescript'
        working-directory: example
        run: npm ci

      - name: Install CocoaPods dependencies
        if: matrix.language == 'swift'
        working-directory: example/ios
        run: pod install

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4

  js-build:
    name: JS build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

  # ── Android ──────────────────────────────────────────────────────────────

  android-kotlin-lint:
    name: Android — ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [js-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        working-directory: example/android
        run: ./gradlew :expo-precision-metronome:ktlintCheck --no-daemon

  android-lint:
    name: Android — Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [js-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android Lint
        working-directory: example/android
        run: ./gradlew :expo-precision-metronome:lint --no-daemon

      - name: Upload Lint report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: android-lint-report
          path: android/build/reports/lint-results-debug.xml
          retention-days: 7

  android-build:
    name: Android — build (compileSdk ${{ matrix.compile-sdk }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [js-build, android-kotlin-lint, android-lint]
    strategy:
      matrix:
        compile-sdk: [34, 35]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android (compileSdk ${{ matrix.compile-sdk }})
        working-directory: example/android
        run: ./gradlew assembleDebug -PcompileSdkVersion=${{ matrix.compile-sdk }} --no-daemon

  # ── iOS ──────────────────────────────────────────────────────────────────

  ios-swiftlint:
    name: iOS — SwiftLint
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.x"

      - name: Run SwiftLint
        run: swiftlint lint --strict

  ios-swift-tests:
    name: iOS — Swift unit tests
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.x"

      - name: Run Swift tests
        run: swift test --package-path ios

  ios-build:
    name: iOS — build (simulator)
    runs-on: macos-latest
    timeout-minutes: 30
    needs: [js-build, ios-swiftlint, ios-swift-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.x"

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Install CocoaPods dependencies
        working-directory: example/ios
        run: pod install

      - name: Build iOS (simulator, no signing)
        working-directory: example/ios
        run: |
          xcodebuild \
            -workspace expoprecisionmetronomeexample.xcworkspace \
            -scheme expoprecisionmetronomeexample \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet \
            build
