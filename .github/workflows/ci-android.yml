name: Android

on:
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - "example/android/**"
      - "package.json"
      - "package-lock.json"
      - "expo-module.config.json"
      - ".github/workflows/ci-android.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HUSKY: "0"

jobs:
  android-kotlin-lint:
    name: Android — ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        working-directory: example/android
        run: ./gradlew :expo-precision-metronome:ktlintCheck --no-daemon

  android-lint:
    name: Android — Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android Lint
        working-directory: example/android
        run: ./gradlew :expo-precision-metronome:lint --no-daemon

      - name: Upload Lint report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: android-lint-report
          path: android/build/reports/lint-results-debug.xml
          retention-days: 7

  android-unit-tests:
    name: Android — JVM unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM unit tests
        working-directory: example/android
        run: ./gradlew :expo-precision-metronome:test --no-daemon

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: android-unit-test-report
          path: android/build/reports/tests/
          retention-days: 7

  android-build:
    name: Android — build (compileSdk ${{ matrix.compile-sdk }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [android-kotlin-lint, android-lint, android-unit-tests]
    strategy:
      matrix:
        compile-sdk: [36]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node with cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android (compileSdk ${{ matrix.compile-sdk }})
        working-directory: example/android
        run: ./gradlew assembleDebug -Pandroid.compileSdkVersion=${{ matrix.compile-sdk }} --no-daemon
