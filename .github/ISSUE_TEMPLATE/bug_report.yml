name: Bug Report
description: Report a bug in expo-precision-metronome
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the bug report! Please fill in as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is
      placeholder: "Describe what happened and why you consider it a bug."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Configure metronome with BPM = ...
        2. Call startMetronome()
        3. Observe timing drift of ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should have happened
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened, including error messages and logs
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: expo version, react-native version, device/OS
      placeholder: "expo 55, react-native 0.82, iPhone 16 iOS 18 / Pixel 8 Android 15"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true
