version = 1

[[annotations]]
path = [
  "package.json",
  "package-lock.json",
  "tsconfig.json",
  "expo-module.config.json",
  ".gitignore",
  ".editorconfig",
  ".npmignore",
  ".swiftlint.yml",
  ".prettierrc",
  ".prettierignore",
  "eslint.config.js",
  ".husky/**",
  "example/**",
  "codecov.yml",
  ".github/**",
  "CHANGELOG.md",
  "CONTRIBUTING.md",
  "CODE_OF_CONDUCT.md",
  "README.md",
]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Andrey Kotlyar <kotlyar562@gmail.com>"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = ["src/**", "android/**", "ios/**"]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Andrey Kotlyar <kotlyar562@gmail.com>"
SPDX-License-Identifier = "MIT"
